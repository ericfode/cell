<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gas City — Agent REPL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');

  :root {
    --bg-base: #0a0c10;
    --bg-raised: #12151c;
    --bg-surface: #181c26;
    --bg-overlay: #1e2330;
    --border-dim: #262c3a;
    --border-mid: #333b50;
    --border-bright: #4a5578;
    --text-primary: #d4daf0;
    --text-secondary: #8892ab;
    --text-dim: #5a6480;
    --text-label: #6b7594;
    --accent-amber: #e8a838;
    --accent-amber-dim: #e8a83822;
    --accent-green: #3dd68c;
    --accent-green-dim: #3dd68c18;
    --accent-red: #f06060;
    --accent-red-dim: #f0606018;
    --accent-blue: #5b9cf5;
    --accent-blue-dim: #5b9cf518;
    --accent-cyan: #56d4c8;
    --accent-cyan-dim: #56d4c818;
    --accent-purple: #a88bfa;
    --accent-purple-dim: #a88bfa18;
    --pin-dashed: #e8a838;
    --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
    --font-sans: 'DM Sans', -apple-system, sans-serif;
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.55;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ── Scanline effect ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9998;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }

  /* ── Top Bar ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--bg-raised);
    border-bottom: 1px solid var(--border-dim);
    flex-shrink: 0;
    z-index: 100;
    user-select: none;
  }

  .top-bar .left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .top-bar .logo {
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 14px;
    color: var(--accent-amber);
    letter-spacing: 0.5px;
  }

  .top-bar .sheet-badge {
    background: var(--bg-overlay);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm);
    padding: 3px 10px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .top-bar .sheet-badge .name {
    color: var(--accent-cyan);
  }

  .top-bar .session-info {
    font-size: 11px;
    color: var(--text-dim);
  }

  .top-bar .right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .top-bar .btn {
    background: var(--bg-overlay);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm);
    padding: 5px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .top-bar .btn:hover {
    background: var(--bg-surface);
    border-color: var(--border-mid);
    color: var(--text-primary);
  }

  .top-bar .btn.primary {
    border-color: var(--accent-amber);
    color: var(--accent-amber);
  }

  .top-bar .btn.primary:hover {
    background: var(--accent-amber-dim);
  }

  /* ── Notebook Area ── */
  .notebook {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
    scroll-behavior: smooth;
  }

  .notebook::-webkit-scrollbar { width: 6px; }
  .notebook::-webkit-scrollbar-track { background: transparent; }
  .notebook::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px; }
  .notebook::-webkit-scrollbar-thumb:hover { background: var(--border-mid); }

  /* ── Output Cell ── */
  .cell {
    margin: 0 20px 12px;
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-lg);
    overflow: hidden;
    animation: cellFadeIn 0.3s ease-out;
    position: relative;
  }

  @keyframes cellFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cell-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--bg-raised);
    border-bottom: 1px solid var(--border-dim);
    font-size: 11px;
    user-select: none;
  }

  .cell-header .left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cell-header .cell-num {
    color: var(--text-dim);
    font-size: 10px;
    min-width: 28px;
  }

  .cell-header .cmd {
    color: var(--accent-amber);
    font-weight: 500;
  }

  .cell-header .type-badge {
    padding: 1px 7px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .type-grid { background: var(--accent-green-dim); color: var(--accent-green); border: 1px solid rgba(61,214,140,0.25); }
  .type-diagram { background: var(--accent-blue-dim); color: var(--accent-blue); border: 1px solid rgba(91,156,245,0.25); }
  .type-text { background: var(--accent-purple-dim); color: var(--accent-purple); border: 1px solid rgba(168,139,250,0.25); }
  .type-diff { background: var(--accent-red-dim); color: var(--accent-red); border: 1px solid rgba(240,96,96,0.25); }
  .type-pin { background: var(--accent-amber-dim); color: var(--accent-amber); border: 1px solid rgba(232,168,56,0.25); }
  .type-eval { background: var(--accent-cyan-dim); color: var(--accent-cyan); border: 1px solid rgba(86,212,200,0.25); }

  .cell-header .right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cell-header .copy-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 2px 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .cell-header .copy-btn:hover {
    color: var(--text-secondary);
    border-color: var(--border-dim);
  }

  .cell-header .copy-btn.copied {
    color: var(--accent-green);
  }

  .cell-header .timestamp {
    color: var(--text-dim);
    font-size: 10px;
  }

  .cell-body {
    padding: 14px;
    background: var(--bg-base);
  }

  /* ── Grid Output (mini living grid) ── */
  .mini-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }

  .mini-grid .grid-cell {
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-md);
    padding: 10px;
    transition: border-color 0.15s;
    cursor: default;
    position: relative;
  }

  .mini-grid .grid-cell:hover {
    border-color: var(--border-mid);
  }

  .mini-grid .grid-cell .cell-name {
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mini-grid .grid-cell .cell-status {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .status-fresh { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
  .status-stale { background: var(--accent-amber); box-shadow: 0 0 6px var(--accent-amber); }
  .status-computing { background: var(--accent-blue); box-shadow: 0 0 6px var(--accent-blue); animation: pulse 1.5s infinite; }
  .status-error { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }
  .status-pinned { background: var(--accent-amber); box-shadow: 0 0 6px var(--accent-amber); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .mini-grid .grid-cell .cell-preview {
    font-size: 10px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 140px;
  }

  .mini-grid .grid-cell .cell-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    font-size: 9px;
    color: var(--text-dim);
  }

  .mini-grid .grid-cell .pin-icon {
    color: var(--accent-amber);
    font-size: 10px;
  }

  /* ── Trace Diagram ── */
  .trace-diagram {
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    padding: 12px 0;
  }

  .trace-diagram::-webkit-scrollbar { height: 4px; }
  .trace-diagram::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

  .trace-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 120px;
    flex-shrink: 0;
  }

  .trace-node .node-box {
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-md);
    padding: 8px 14px;
    text-align: center;
    transition: all 0.15s;
    position: relative;
  }

  .trace-node .node-box.stale {
    border-color: var(--accent-amber);
    background: var(--accent-amber-dim);
  }

  .trace-node .node-box.fresh {
    border-color: rgba(61,214,140,0.3);
  }

  .trace-node .node-box .node-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .trace-node .node-box .node-age {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .trace-node .node-box .stale-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--accent-amber);
    color: var(--bg-base);
    font-size: 8px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }

  .trace-arrow {
    display: flex;
    align-items: center;
    color: var(--border-mid);
    font-size: 18px;
    padding: 0 4px;
    flex-shrink: 0;
  }

  .trace-arrow svg {
    width: 40px;
    height: 16px;
  }

  /* ── Eval Output (syntax highlighted prompt) ── */
  .eval-output {
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-md);
    padding: 14px;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .eval-output .ref {
    background: var(--accent-cyan-dim);
    color: var(--accent-cyan);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid rgba(86,212,200,0.2);
    font-weight: 500;
  }

  .eval-output .ref-resolved {
    background: var(--accent-green-dim);
    color: var(--accent-green);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid rgba(61,214,140,0.2);
    font-weight: 500;
  }

  .eval-output .ref-stale {
    background: var(--accent-amber-dim);
    color: var(--accent-amber);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid rgba(232,168,56,0.25);
    font-weight: 500;
    text-decoration: wavy underline;
    text-underline-offset: 3px;
  }

  .eval-output .section-label {
    color: var(--text-dim);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 4px;
    margin-top: 12px;
  }

  .eval-output .section-label:first-child {
    margin-top: 0;
  }

  .eval-dry-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-dim);
    font-size: 11px;
  }

  .eval-dry-header .tag {
    background: var(--accent-amber-dim);
    color: var(--accent-amber);
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
  }

  .eval-dry-header .target {
    color: var(--text-secondary);
  }

  /* ── Pin Output ── */
  .pin-output {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .pin-panel {
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-md);
    padding: 12px;
  }

  .pin-panel.before {
    border-color: rgba(240,96,96,0.25);
  }

  .pin-panel.after {
    border-color: rgba(232,168,56,0.4);
    border-style: dashed;
  }

  .pin-panel .panel-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .pin-panel.before .panel-label { color: var(--text-dim); }
  .pin-panel.after .panel-label { color: var(--accent-amber); }

  .pin-panel .panel-content {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .pin-panel.after .panel-content {
    color: var(--text-primary);
  }

  .pin-confirmation {
    margin-top: 10px;
    padding: 8px 12px;
    background: var(--accent-amber-dim);
    border: 1px solid rgba(232,168,56,0.2);
    border-radius: var(--radius-md);
    font-size: 11px;
    color: var(--accent-amber);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Diff Output ── */
  .diff-output {
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .diff-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg-overlay);
    border-bottom: 1px solid var(--border-dim);
    font-size: 11px;
  }

  .diff-header .versions {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
  }

  .diff-header .ver-old { color: var(--accent-red); }
  .diff-header .ver-new { color: var(--accent-green); }
  .diff-header .ver-arrow { color: var(--text-dim); }

  .diff-header .similarity {
    color: var(--text-dim);
    font-size: 10px;
  }

  .diff-body {
    padding: 12px;
    font-size: 12px;
    line-height: 1.7;
  }

  .diff-line {
    padding: 2px 8px;
    border-radius: 3px;
    margin: 1px 0;
  }

  .diff-line.removed {
    background: var(--accent-red-dim);
    color: var(--accent-red);
  }

  .diff-line.added {
    background: var(--accent-green-dim);
    color: var(--accent-green);
  }

  .diff-line.context {
    color: var(--text-dim);
  }

  .diff-line .line-marker {
    display: inline-block;
    width: 16px;
    font-weight: 700;
    user-select: none;
  }

  /* ── Sankey Inline ── */
  .sankey-inline {
    padding: 8px 0;
  }

  .sankey-inline svg {
    width: 100%;
    height: auto;
  }

  /* ── Unpin Output ── */
  .unpin-output {
    padding: 8px 12px;
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-md);
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .unpin-output .icon {
    font-size: 16px;
  }

  .unpin-output .affected {
    margin-top: 4px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── Result Eval ── */
  .eval-result {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-md);
  }

  .eval-result .result-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 11px;
  }

  .eval-result .result-status {
    padding: 1px 7px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    background: var(--accent-green-dim);
    color: var(--accent-green);
    border: 1px solid rgba(61,214,140,0.25);
  }

  .eval-result .result-text {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* ── Command Input ── */
  .input-area {
    flex-shrink: 0;
    padding: 12px 20px 16px;
    background: var(--bg-raised);
    border-top: 1px solid var(--border-dim);
    position: relative;
    z-index: 100;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-base);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-md);
    padding: 4px 4px 4px 14px;
    transition: border-color 0.15s;
  }

  .input-row:focus-within {
    border-color: var(--accent-amber);
    box-shadow: 0 0 0 1px var(--accent-amber-dim);
  }

  .input-prompt {
    color: var(--accent-amber);
    font-weight: 700;
    font-size: 14px;
    user-select: none;
    flex-shrink: 0;
  }

  .input-row input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    padding: 8px 0;
  }

  .input-row input::placeholder {
    color: var(--text-dim);
  }

  .input-row .run-btn {
    background: var(--accent-amber);
    color: var(--bg-base);
    border: none;
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .input-row .run-btn:hover {
    background: #f0b440;
    transform: translateY(-1px);
  }

  .input-row .run-btn:active {
    transform: translateY(0);
  }

  .input-hints {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    font-size: 10px;
    color: var(--text-dim);
    padding: 0 4px;
  }

  .input-hints kbd {
    background: var(--bg-overlay);
    border: 1px solid var(--border-dim);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: var(--font-mono);
    font-size: 9px;
  }

  /* ── Autocomplete ── */
  .autocomplete {
    position: absolute;
    bottom: 100%;
    left: 20px;
    right: 20px;
    background: var(--bg-surface);
    border: 1px solid var(--border-mid);
    border-radius: var(--radius-md);
    max-height: 220px;
    overflow-y: auto;
    display: none;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
    margin-bottom: 4px;
    z-index: 200;
  }

  .autocomplete.visible {
    display: block;
  }

  .autocomplete .ac-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .autocomplete .ac-item:hover,
  .autocomplete .ac-item.selected {
    background: var(--bg-overlay);
  }

  .autocomplete .ac-item .ac-cmd {
    color: var(--accent-amber);
    font-weight: 500;
    font-size: 12px;
  }

  .autocomplete .ac-item .ac-desc {
    color: var(--text-dim);
    font-size: 10px;
  }

  /* ── Session Pin Banner ── */
  .pin-banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 6px 20px;
    background: var(--accent-amber-dim);
    border-bottom: 1px solid rgba(232,168,56,0.15);
    font-size: 11px;
    color: var(--accent-amber);
    flex-shrink: 0;
  }

  .pin-banner.visible {
    display: flex;
  }

  .pin-banner .pin-list {
    display: flex;
    gap: 8px;
  }

  .pin-banner .pin-tag {
    background: rgba(232,168,56,0.12);
    border: 1px dashed rgba(232,168,56,0.35);
    border-radius: 3px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 500;
  }

  /* ── Animations ── */
  @keyframes typeIn {
    from { width: 0; }
    to { width: 100%; }
  }

  .cell.computing .cell-body {
    position: relative;
  }

  .cell.computing .cell-body::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .pin-output { grid-template-columns: 1fr; }
    .mini-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    .cell { margin: 0 10px 10px; }
    .input-area { padding: 10px; }
  }
</style>
</head>
<body>

<!-- ── Top Bar ── -->
<div class="top-bar">
  <div class="left">
    <span class="logo">GAS CITY REPL</span>
    <span class="sheet-badge">sheet: <span class="name">mol-algebraic-survey</span></span>
    <span class="session-info">session 7c3f · 7 cells · 2m 34s</span>
  </div>
  <div class="right">
    <button class="btn" onclick="clearSession()">Clear</button>
    <button class="btn primary" onclick="exportSession()">Save Session</button>
  </div>
</div>

<!-- ── Active Pin Banner ── -->
<div class="pin-banner" id="pinBanner">
  <span style="font-weight:600;">PINNED:</span>
  <div class="pin-list" id="pinList"></div>
  <span style="color:var(--text-dim); margin-left:auto; font-size:10px;">pinned values override computed outputs</span>
</div>

<!-- ── Notebook ── -->
<div class="notebook" id="notebook"></div>

<!-- ── Command Input ── -->
<div class="input-area">
  <div class="autocomplete" id="autocomplete"></div>
  <div class="input-row">
    <span class="input-prompt">&#9656;</span>
    <input type="text" id="cmdInput" placeholder="Type a command… (sheet status, eval, trace, pin, diff, sankey)" autocomplete="off" spellcheck="false">
    <button class="run-btn" onclick="executeCommand()">RUN</button>
  </div>
  <div class="input-hints">
    <span><kbd>Enter</kbd> run</span>
    <span><kbd>Tab</kbd> autocomplete</span>
    <span><kbd>&#8593;</kbd><kbd>&#8595;</kbd> history</span>
    <span><kbd>Ctrl+L</kbd> clear</span>
  </div>
</div>

<script>
// ── State ──
const state = {
  cells: [],
  cellCounter: 0,
  history: [],
  historyIndex: -1,
  pins: {},
  selectedAC: -1,
  sheetData: {
    name: 'mol-algebraic-survey',
    cells: {
      'extract-types': {
        status: 'stale', age: '23m', preview: '5 types: Graph, DAG, Cell…',
        content: 'Analyzed codebase. Found 5 core algebraic types:\n1. Graph — directed acyclic computation graph\n2. DAG — dependency-ordered evaluation\n3. Cell — reactive value container\n4. Wire — typed connection between cells\n5. Formula — declarative computation rule'
      },
      'extract-relations': {
        status: 'fresh', age: '4m', preview: '12 relations identified',
        content: '12 binary relations between types:\nGraph → DAG (contains), Cell → Wire (emits), Wire → Cell (connects)…'
      },
      'extract-axioms': {
        status: 'fresh', age: '6m', preview: '8 axioms, 3 conjectures',
        content: '8 verified axioms governing type interactions. 3 unverified conjectures about composition.'
      },
      'synthesize': {
        status: 'stale', age: '25m', preview: 'Algebraic framework v2…',
        versions: {
          v2: 'The algebraic framework for Gas City computation defines a five-element algebra over {Graph, DAG, Cell, Wire, Formula} with composition governed by 8 axioms. Type extraction identified these from codebase analysis. However, the extract-types input was from an older codebase revision.',
          v3: 'The algebraic framework for Gas City defines a five-element algebra over {Graph, DAG, Cell, Wire, Formula}. Composition follows 8 axioms with 3 open conjectures. Key insight: Cells form a monad over Wire, enabling functional reactive composition. Pin-based overrides preserve algebraic invariants.'
        }
      },
      'validate': {
        status: 'fresh', age: '3m', preview: 'All axioms hold ✓',
        content: 'Validation pass: 8/8 axioms hold. 2/3 conjectures confirmed via counterexample search.'
      },
      'summarize': {
        status: 'fresh', age: '2m', preview: 'Executive summary ready',
        content: 'Gas City implements a five-element computational algebra with verified axiomatic foundations.'
      }
    }
  }
};

// ── Commands ──
const COMMANDS = [
  { cmd: 'sheet status', desc: 'Show the Living Grid for the current sheet', args: '[sheet-name]' },
  { cmd: 'trace', desc: 'Show provenance chain for a cell', args: '<cell-name>' },
  { cmd: 'eval', desc: 'Evaluate a cell (--dry-run to preview prompt)', args: '<cell-name> [--dry-run]' },
  { cmd: 'pin', desc: 'Pin a cell to a fixed value', args: '<cell-name> "<value>"' },
  { cmd: 'unpin', desc: 'Remove pin and restore computed value', args: '<cell-name>' },
  { cmd: 'diff', desc: 'Compare versions of a cell', args: '<cell-name> <v1> <v2>' },
  { cmd: 'sankey', desc: 'Show information flow Sankey diagram', args: '[cell-name]' },
  { cmd: 'help', desc: 'Show available commands', args: '' },
];

const CELL_NAMES = Object.keys(state.sheetData.cells);

// ── Autocomplete ──
const acEl = document.getElementById('autocomplete');
const inputEl = document.getElementById('cmdInput');

function updateAutocomplete() {
  const val = inputEl.value.trim().toLowerCase();
  if (!val) { acEl.classList.remove('visible'); return; }

  const matches = COMMANDS.filter(c =>
    c.cmd.includes(val) || val.split(' ').some(w => c.cmd.includes(w))
  );

  // Also suggest cell names if we have a command prefix
  const parts = val.split(' ');
  let cellMatches = [];
  if (parts.length >= 2) {
    const partial = parts[parts.length - 1];
    cellMatches = CELL_NAMES.filter(n => n.includes(partial));
  }

  if (matches.length === 0 && cellMatches.length === 0) {
    acEl.classList.remove('visible');
    return;
  }

  let html = '';
  matches.forEach((m, i) => {
    html += `<div class="ac-item${i === state.selectedAC ? ' selected' : ''}" onclick="selectAC('${m.cmd}')">
      <span class="ac-cmd">${m.cmd} ${m.args ? '<span style="color:var(--text-dim)">' + m.args + '</span>' : ''}</span>
      <span class="ac-desc">${m.desc}</span>
    </div>`;
  });

  cellMatches.forEach(n => {
    const cellInfo = state.sheetData.cells[n];
    html += `<div class="ac-item" onclick="selectCellAC('${n}')">
      <span class="ac-cmd">${n}</span>
      <span class="ac-desc">${cellInfo.status} · ${cellInfo.age}</span>
    </div>`;
  });

  acEl.innerHTML = html;
  acEl.classList.add('visible');
}

function selectAC(cmd) {
  inputEl.value = cmd + ' ';
  inputEl.focus();
  acEl.classList.remove('visible');
  state.selectedAC = -1;
}

function selectCellAC(name) {
  const parts = inputEl.value.trim().split(' ');
  parts[parts.length - 1] = name;
  inputEl.value = parts.join(' ') + ' ';
  inputEl.focus();
  acEl.classList.remove('visible');
}

// ── Command Execution ──
function executeCommand() {
  const raw = inputEl.value.trim();
  if (!raw) return;

  state.history.push(raw);
  state.historyIndex = state.history.length;
  inputEl.value = '';
  acEl.classList.remove('visible');

  const parts = raw.split(/\s+/);
  const cmd = parts[0];

  if (cmd === 'sheet' && parts[1] === 'status') {
    renderSheetStatus(parts[2] || state.sheetData.name, raw);
  } else if (cmd === 'trace') {
    renderTrace(parts[1], raw);
  } else if (cmd === 'eval') {
    const dryRun = parts.includes('--dry-run');
    renderEval(parts[1], dryRun, raw);
  } else if (cmd === 'pin') {
    const cellName = parts[1];
    const valueMatch = raw.match(/"([^"]+)"/);
    const value = valueMatch ? valueMatch[1] : parts.slice(2).join(' ');
    renderPin(cellName, value, raw);
  } else if (cmd === 'unpin') {
    renderUnpin(parts[1], raw);
  } else if (cmd === 'diff') {
    renderDiff(parts[1], parts[2], parts[3], raw);
  } else if (cmd === 'sankey') {
    renderSankey(parts[1], raw);
  } else if (cmd === 'help') {
    renderHelp(raw);
  } else {
    renderError(raw, `Unknown command: ${cmd}`);
  }

  scrollToBottom();
}

function scrollToBottom() {
  const nb = document.getElementById('notebook');
  requestAnimationFrame(() => {
    nb.scrollTop = nb.scrollHeight;
  });
}

function addCell(type, typeBadge, cmd, contentHTML) {
  state.cellCounter++;
  const nb = document.getElementById('notebook');
  const now = new Date();
  const ts = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.innerHTML = `
    <div class="cell-header">
      <div class="left">
        <span class="cell-num">[${state.cellCounter}]</span>
        <span class="cmd">${escapeHtml(cmd)}</span>
        <span class="type-badge type-${type}">${typeBadge}</span>
      </div>
      <div class="right">
        <span class="timestamp">${ts}</span>
        <button class="copy-btn" onclick="copyCell(this)">copy</button>
      </div>
    </div>
    <div class="cell-body">${contentHTML}</div>
  `;
  nb.appendChild(cell);
  return cell;
}

function copyCell(btn) {
  const body = btn.closest('.cell').querySelector('.cell-body');
  navigator.clipboard.writeText(body.innerText).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Renderers ──
function renderSheetStatus(name, raw) {
  const cells = state.sheetData.cells;
  let gridHTML = '<div class="mini-grid">';
  for (const [cellName, info] of Object.entries(cells)) {
    const isPinned = state.pins[cellName];
    const displayStatus = isPinned ? 'pinned' : info.status;
    const statusClass = isPinned ? 'status-pinned' : `status-${info.status}`;
    gridHTML += `
      <div class="grid-cell">
        <div class="cell-name">
          <span class="cell-status ${statusClass}"></span>
          ${cellName}
          ${isPinned ? '<span class="pin-icon">&#x1F4CC;</span>' : ''}
        </div>
        <div class="cell-preview">${isPinned ? truncate(state.pins[cellName], 30) : info.preview}</div>
        <div class="cell-meta">
          <span>${displayStatus}</span>
          <span>·</span>
          <span>${isPinned ? 'pinned' : info.age}</span>
        </div>
      </div>
    `;
  }
  gridHTML += '</div>';
  addCell('grid', 'grid', raw, gridHTML);
}

function renderTrace(cellName, raw) {
  if (!cellName || !state.sheetData.cells[cellName]) {
    renderError(raw, cellName ? `Cell not found: ${cellName}` : 'Usage: trace <cell-name>');
    return;
  }

  // Build a mock provenance chain
  const chains = {
    'synthesize': ['extract-types', 'extract-relations', 'extract-axioms', 'synthesize'],
    'validate': ['extract-axioms', 'synthesize', 'validate'],
    'summarize': ['synthesize', 'validate', 'summarize'],
    'extract-types': ['extract-types'],
    'extract-relations': ['extract-types', 'extract-relations'],
    'extract-axioms': ['extract-types', 'extract-relations', 'extract-axioms'],
  };

  const chain = chains[cellName] || [cellName];

  let html = '<div class="trace-diagram">';
  chain.forEach((node, i) => {
    const info = state.sheetData.cells[node];
    const isStale = info.status === 'stale' && !state.pins[node];
    const isPinned = !!state.pins[node];
    const cls = isPinned ? 'fresh' : (isStale ? 'stale' : 'fresh');

    html += `<div class="trace-node">
      <div class="node-box ${cls}">
        <div class="node-name">${node}${isPinned ? ' &#x1F4CC;' : ''}</div>
        <div class="node-age">${isPinned ? 'pinned' : info.age}</div>
        ${isStale ? '<span class="stale-badge">STALE</span>' : ''}
      </div>
    </div>`;

    if (i < chain.length - 1) {
      html += `<div class="trace-arrow">
        <svg viewBox="0 0 40 16"><line x1="2" y1="8" x2="32" y2="8" stroke="currentColor" stroke-width="1.5"/><polygon points="32,4 38,8 32,12" fill="currentColor"/></svg>
      </div>`;
    }
  });
  html += '</div>';

  addCell('diagram', 'diagram', raw, html);
}

function renderEval(cellName, dryRun, raw) {
  if (!cellName || !state.sheetData.cells[cellName]) {
    renderError(raw, cellName ? `Cell not found: ${cellName}` : 'Usage: eval <cell-name> [--dry-run]');
    return;
  }

  if (dryRun) {
    // Show filled prompt with substitutions
    let html = `<div class="eval-dry-header">
      <span class="tag">DRY RUN</span>
      <span class="target">target: ${cellName}</span>
    </div>`;
    html += '<div class="eval-output">';

    if (cellName === 'synthesize') {
      const typesContent = state.pins['extract-types'] || state.sheetData.cells['extract-types'].content;
      const relContent = state.sheetData.cells['extract-relations'].content;
      const axContent = state.sheetData.cells['extract-axioms'].content;
      const typesClass = state.pins['extract-types'] ? 'ref-resolved' : (state.sheetData.cells['extract-types'].status === 'stale' ? 'ref-stale' : 'ref-resolved');

      html += `<span class="section-label">System Prompt</span>
You are a mathematical framework synthesizer. Given extracted types, relations, and axioms from a codebase, produce a unified algebraic framework description.

<span class="section-label">Input: extract-types</span>
<span class="${typesClass}">{{extract-types}}</span> → ${escapeHtml(truncate(typesContent, 120))}

<span class="section-label">Input: extract-relations</span>
<span class="ref-resolved">{{extract-relations}}</span> → ${escapeHtml(truncate(relContent, 120))}

<span class="section-label">Input: extract-axioms</span>
<span class="ref-resolved">{{extract-axioms}}</span> → ${escapeHtml(truncate(axContent, 120))}

<span class="section-label">Instructions</span>
Synthesize these into a cohesive algebraic framework. Identify the core algebra, composition rules, and any emergent properties.`;
      html += '</div>';
    } else {
      html += `<span class="section-label">Prompt for ${cellName}</span>
Evaluate cell "${cellName}" with current inputs...`;
      html += '</div>';
    }

    addCell('eval', 'eval', raw, html);
  } else {
    // Simulate running eval
    const cell = addCell('eval', 'eval', raw, '<div style="color:var(--text-dim);font-size:12px;">Computing…</div>');
    cell.classList.add('computing');

    setTimeout(() => {
      cell.classList.remove('computing');
      const info = state.sheetData.cells[cellName];
      let resultText = info.content || info.preview;
      if (cellName === 'synthesize' && state.pins['extract-types']) {
        resultText = info.versions?.v3 || resultText;
        // Update the cell state
        state.sheetData.cells[cellName].status = 'fresh';
        state.sheetData.cells[cellName].age = 'now';
      }

      const body = cell.querySelector('.cell-body');
      body.innerHTML = `<div class="eval-result">
        <div class="result-header">
          <span class="result-status">OK</span>
          <span style="color:var(--text-dim);font-size:11px;">${cellName} evaluated in 3.2s</span>
        </div>
        <div class="result-text">${escapeHtml(resultText)}</div>
      </div>`;
    }, 1800);
  }
}

function renderPin(cellName, value, raw) {
  if (!cellName || !state.sheetData.cells[cellName]) {
    renderError(raw, cellName ? `Cell not found: ${cellName}` : 'Usage: pin <cell-name> "<value>"');
    return;
  }

  const oldContent = state.sheetData.cells[cellName].content || state.sheetData.cells[cellName].preview;

  state.pins[cellName] = value;
  updatePinBanner();

  const html = `<div class="pin-output">
    <div class="pin-panel before">
      <div class="panel-label">Before (computed)</div>
      <div class="panel-content">${escapeHtml(truncate(oldContent, 200))}</div>
    </div>
    <div class="pin-panel after">
      <div class="panel-label">After (pinned)</div>
      <div class="panel-content">${escapeHtml(value)}</div>
    </div>
  </div>
  <div class="pin-confirmation">
    <span>&#x1F4CC;</span>
    <span><strong>${cellName}</strong> pinned. Downstream cells will use this value until unpinned.</span>
  </div>`;

  addCell('pin', 'pin', raw, html);
}

function renderUnpin(cellName, raw) {
  if (!cellName) {
    renderError(raw, 'Usage: unpin <cell-name>');
    return;
  }

  if (!state.pins[cellName]) {
    renderError(raw, `${cellName} is not pinned`);
    return;
  }

  delete state.pins[cellName];
  updatePinBanner();

  // Find downstream cells
  const downstreams = {
    'extract-types': ['extract-relations', 'extract-axioms', 'synthesize'],
    'extract-relations': ['extract-axioms', 'synthesize'],
    'extract-axioms': ['synthesize', 'validate'],
    'synthesize': ['validate', 'summarize'],
  };

  const affected = downstreams[cellName] || [];

  const html = `<div class="unpin-output">
    <span class="icon">&#x1F513;</span>
    <div>
      <div><strong>${cellName}</strong> unpinned — restored to computed value</div>
      ${affected.length ? `<div class="affected">Downstream cells now stale: ${affected.join(', ')}</div>` : ''}
    </div>
  </div>`;

  addCell('pin', 'pin', raw, html);
}

function renderDiff(cellName, v1, v2, raw) {
  if (!cellName || !v1 || !v2) {
    renderError(raw, 'Usage: diff <cell-name> <v1> <v2>');
    return;
  }

  const info = state.sheetData.cells[cellName];
  if (!info || !info.versions) {
    renderError(raw, `No version history for: ${cellName}`);
    return;
  }

  const oldText = info.versions[v1] || 'Version not found';
  const newText = info.versions[v2] || 'Version not found';

  // Simulate a semantic diff
  const html = `<div class="diff-output">
    <div class="diff-header">
      <div class="versions">
        <span class="ver-old">${v1}</span>
        <span class="ver-arrow">→</span>
        <span class="ver-new">${v2}</span>
      </div>
      <span class="similarity">semantic similarity: 72%</span>
    </div>
    <div class="diff-body">
      <div class="diff-line context"><span class="line-marker"> </span>The algebraic framework for Gas City</div>
      <div class="diff-line removed"><span class="line-marker">−</span>computation defines a five-element algebra</div>
      <div class="diff-line added"><span class="line-marker">+</span>defines a five-element algebra</div>
      <div class="diff-line context"><span class="line-marker"> </span>over {Graph, DAG, Cell, Wire, Formula}</div>
      <div class="diff-line removed"><span class="line-marker">−</span>with composition governed by 8 axioms. Type</div>
      <div class="diff-line removed"><span class="line-marker">−</span>extraction identified these from codebase</div>
      <div class="diff-line removed"><span class="line-marker">−</span>analysis. However, the extract-types input</div>
      <div class="diff-line removed"><span class="line-marker">−</span>was from an older codebase revision.</div>
      <div class="diff-line added"><span class="line-marker">+</span>Composition follows 8 axioms with 3 open</div>
      <div class="diff-line added"><span class="line-marker">+</span>conjectures. Key insight: Cells form a monad</div>
      <div class="diff-line added"><span class="line-marker">+</span>over Wire, enabling functional reactive</div>
      <div class="diff-line added"><span class="line-marker">+</span>composition. Pin-based overrides preserve</div>
      <div class="diff-line added"><span class="line-marker">+</span>algebraic invariants.</div>
    </div>
  </div>`;

  addCell('diff', 'diff', raw, html);
}

function renderSankey(cellName, raw) {
  const html = `<div class="sankey-inline">
    <svg viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sg1" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#5b9cf5" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#56d4c8" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="sg2" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#56d4c8" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#a88bfa" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="sg3" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#a88bfa" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#3dd68c" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="sg4" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#3dd68c" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#e8a838" stop-opacity="0.6"/>
        </linearGradient>
      </defs>

      <!-- Source nodes -->
      <rect x="20" y="30" width="12" height="70" rx="3" fill="#5b9cf5"/>
      <text x="16" y="120" fill="#8892ab" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="end" transform="rotate(-35, 16, 120)">extract-types</text>

      <rect x="20" y="120" width="12" height="50" rx="3" fill="#5b9cf5"/>
      <text x="16" y="190" fill="#8892ab" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="end" transform="rotate(-35, 16, 190)">extract-relations</text>

      <rect x="20" y="190" width="12" height="45" rx="3" fill="#5b9cf5"/>
      <text x="16" y="255" fill="#8892ab" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="end" transform="rotate(-35, 16, 255)">extract-axioms</text>

      <!-- Flow: sources → synthesize -->
      <path d="M32,50 C150,50 150,60 260,60" fill="none" stroke="url(#sg1)" stroke-width="28" opacity="0.4"/>
      <path d="M32,140 C150,140 150,90 260,90" fill="none" stroke="url(#sg1)" stroke-width="20" opacity="0.4"/>
      <path d="M32,210 C150,210 150,120 260,115" fill="none" stroke="url(#sg1)" stroke-width="18" opacity="0.4"/>

      <!-- Synthesize node -->
      <rect x="260" y="40" width="12" height="100" rx="3" fill="#56d4c8"/>
      <text x="266" y="160" fill="#56d4c8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">synthesize</text>

      <!-- Flow: synthesize → validate -->
      <path d="M272,70 C400,70 400,80 500,80" fill="none" stroke="url(#sg2)" stroke-width="30" opacity="0.4"/>

      <!-- axioms → validate -->
      <path d="M32,220 C250,220 350,130 500,110" fill="none" stroke="url(#sg2)" stroke-width="14" opacity="0.3"/>

      <!-- Validate node -->
      <rect x="500" y="60" width="12" height="75" rx="3" fill="#a88bfa"/>
      <text x="506" y="155" fill="#a88bfa" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">validate</text>

      <!-- Flow: synthesize + validate → summarize -->
      <path d="M272,110 C450,110 550,170 680,170" fill="none" stroke="url(#sg3)" stroke-width="22" opacity="0.4"/>
      <path d="M512,100 C600,100 620,185 680,185" fill="none" stroke="url(#sg4)" stroke-width="16" opacity="0.4"/>

      <!-- Summarize node -->
      <rect x="680" y="155" width="12" height="50" rx="3" fill="#e8a838"/>
      <text x="686" y="225" fill="#e8a838" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle">summarize</text>

      <!-- Legend -->
      <text x="750" y="20" fill="#5a6480" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="end">info flow →</text>
    </svg>
  </div>`;

  addCell('diagram', 'diagram', raw, html);
}

function renderHelp(raw) {
  let html = '<div style="font-size:12px; line-height:1.8;">';
  COMMANDS.forEach(c => {
    html += `<div><span style="color:var(--accent-amber);font-weight:600;display:inline-block;width:140px;">${c.cmd}</span>`;
    if (c.args) html += `<span style="color:var(--text-dim);margin-right:12px;">${c.args}</span>`;
    html += `<span style="color:var(--text-secondary);">${c.desc}</span></div>`;
  });
  html += '</div>';
  addCell('text', 'text', raw, html);
}

function renderError(raw, msg) {
  const html = `<div style="color:var(--accent-red);font-size:12px;">Error: ${escapeHtml(msg)}</div>`;
  addCell('text', 'text', raw, html);
}

// ── Helpers ──
function truncate(s, len) {
  if (!s) return '';
  return s.length > len ? s.substring(0, len) + '…' : s;
}

function updatePinBanner() {
  const banner = document.getElementById('pinBanner');
  const list = document.getElementById('pinList');
  const pinNames = Object.keys(state.pins);
  if (pinNames.length === 0) {
    banner.classList.remove('visible');
    return;
  }
  banner.classList.add('visible');
  list.innerHTML = pinNames.map(n =>
    `<span class="pin-tag">${n}</span>`
  ).join('');
}

function clearSession() {
  document.getElementById('notebook').innerHTML = '';
  state.cellCounter = 0;
  state.pins = {};
  updatePinBanner();
}

function exportSession() {
  let md = `# Gas City REPL Session\n## Sheet: ${state.sheetData.name}\n## Date: ${new Date().toISOString()}\n\n`;
  document.querySelectorAll('.cell').forEach(cell => {
    const cmd = cell.querySelector('.cmd')?.textContent || '';
    const body = cell.querySelector('.cell-body')?.innerText || '';
    md += `### \`${cmd}\`\n\n\`\`\`\n${body}\n\`\`\`\n\n`;
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `repl-session-${Date.now()}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Input Handling ──
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const items = acEl.querySelectorAll('.ac-item');
    if (acEl.classList.contains('visible') && state.selectedAC >= 0 && items[state.selectedAC]) {
      items[state.selectedAC].click();
    } else {
      executeCommand();
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const items = acEl.querySelectorAll('.ac-item');
    if (items.length > 0) {
      items[0].click();
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (acEl.classList.contains('visible')) {
      state.selectedAC = Math.max(0, state.selectedAC - 1);
      updateAutocomplete();
    } else if (state.historyIndex > 0) {
      state.historyIndex--;
      inputEl.value = state.history[state.historyIndex];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (acEl.classList.contains('visible')) {
      const items = acEl.querySelectorAll('.ac-item');
      state.selectedAC = Math.min(items.length - 1, state.selectedAC + 1);
      updateAutocomplete();
    } else if (state.historyIndex < state.history.length - 1) {
      state.historyIndex++;
      inputEl.value = state.history[state.historyIndex];
    } else {
      state.historyIndex = state.history.length;
      inputEl.value = '';
    }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    clearSession();
  }
});

inputEl.addEventListener('input', () => {
  state.selectedAC = -1;
  updateAutocomplete();
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.input-area')) {
    acEl.classList.remove('visible');
  }
});

// ── Demo Session ──
function runDemo() {
  const demoCommands = [
    { cmd: 'sheet status mol-algebraic-survey', delay: 300 },
    { cmd: 'trace synthesize', delay: 600 },
    { cmd: 'eval synthesize --dry-run', delay: 900 },
    { cmd: 'pin extract-types "5 types: Graph, DAG, Cell, Wire, Formula"', delay: 1200 },
    { cmd: 'eval synthesize', delay: 1500 },
    { cmd: 'diff synthesize v2 v3', delay: 3600 },
    { cmd: 'unpin extract-types', delay: 3900 },
  ];

  demoCommands.forEach(({ cmd, delay }) => {
    setTimeout(() => {
      inputEl.value = cmd;
      executeCommand();
    }, delay);
  });
}

// Run the demo on load
window.addEventListener('load', () => {
  inputEl.focus();
  runDemo();
});
</script>
